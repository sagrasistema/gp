<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Actividades Profesionales</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            
            /* Prioridades */
            --prio-alta: #ef4444;
            --prio-media: #f59e0b;
            --prio-baja: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
        }

        h1 i {
            color: var(--accent);
            margin-right: 0.5rem;
        }

        /* Tarjeta de Formulario */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            padding: 0.65rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
        }

        button.btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
            height: 42px;
            justify-content: center;
        }

        button.btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Tabla de Actividades */
        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background-color: #f8fafc;
            padding: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* Celdas Editables */
        .editable {
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .editable:focus {
            background-color: #f1f5f9;
            outline: 2px solid var(--accent);
        }

        /* Badges de Prioridad y Estado */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.6rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-alta { background-color: #fee2e2; color: var(--prio-alta); }
        .badge-media { background-color: #fef3c7; color: var(--prio-media); }
        .badge-baja { background-color: #d1fae5; color: var(--prio-baja); }

        select.table-select {
            border: none;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            padding: 4px;
            border-radius: 4px;
        }

        select.table-select:focus {
            background-color: #e2e8f0;
        }

        /* Acciones */
        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .btn-icon-delete:hover {
            color: var(--prio-alta);
            background-color: #fee2e2;
        }

        .hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="ri-checkbox-multiple-line"></i> Control de Actividades Alberto</h1>
    </header>

    <div class="card">
        <form id="activity-form" class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label for="task-name">Actividad / Tarea</label>
                <input type="text" id="task-name" placeholder="Ej. Ajuste de redondeo bimonthly" required>
            </div>
            <div class="form-group">
                <label for="task-desc">Descripción / Nota</label>
                <input type="text" id="task-desc" placeholder="Detalles opcionales...">
            </div>
            <div class="form-group">
                <label for="task-priority">Prioridad</label>
                <select id="task-priority">
                    <option value="Alta">Alta</option>
                    <option value="Media" selected>Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>
            <div class="form-group">
                <label for="task-status">Estado</label>
                <select id="task-status">
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="Completado">Completado</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">
                <i class="ri-add-line"></i> Agregar
            </button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">Actividad</th>
                    <th style="width: 25%;">Descripción / Notas</th>
                    <th style="width: 15%;">Prioridad</th>
                    <th style="width: 15%;">Estado</th>
                    <th style="width: 10%; text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
    <p class="hint"><i class="ri-information-line"></i> <strong>Tip:</strong> Puedes hacer clic directamente sobre el texto de la Actividad o Descripción para editarlo. Los cambios se guardan al hacer clic fuera.</p>
</div>

<script>
    // Cargar datos iniciales o recuperar de LocalStorage
    let activities = JSON.parse(localStorage.getItem('my_activities')) || [
        { id: 1, name: 'Diseñar flujo visual de Cobros y Pagos', desc: 'Presentar al jefe para validación', priority: 'Alta', status: 'En Proceso' },
        { id: 2, name: 'Revisión de formatos fiscales', desc: 'Validar pie de factura con IGTF', priority: 'Media', status: 'Pendiente' }
    ];

    const tableBody = document.getElementById('table-body');
    const activityForm = document.getElementById('activity-form');

    // Función para renderizar la tabla
    function renderTable() {
        tableBody.innerHTML = '';
        
        activities.forEach((activity) => {
            const tr = document.createElement('tr');
            
            // Determinar clase de la prioridad
            const priorityClass = `badge-${activity.priority.toLowerCase()}`;

            tr.innerHTML = `
                <td>
                    <div class="editable" contenteditable="true" onblur="updateText(${activity.id}, 'name', this.innerText)">${activity.name}</div>
                </td>
                <td>
                    <div class="editable" contenteditable="true" onblur="updateText(${activity.id}, 'desc', this.innerText)">${activity.desc}</div>
                </td>
                <td>
                    <select class="table-select badge ${priorityClass}" onchange="updateSelect(${activity.id}, 'priority', this.value)">
                        <option value="Alta" ${activity.priority === 'Alta' ? 'selected' : ''}>Alta</option>
                        <option value="Media" ${activity.priority === 'Media' ? 'selected' : ''}>Media</option>
                        <option value="Baja" ${activity.priority === 'Baja' ? 'selected' : ''}>Baja</option>
                    </select>
                </td>
                <td>
                    <select class="table-select" style="font-weight: 500;" onchange="updateSelect(${activity.id}, 'status', this.value)">
                        <option value="Pendiente" ${activity.status === 'Pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
                        <option value="En Proceso" ${activity.status === 'En Proceso' ? 'selected' : ''}>🚀 En Proceso</option>
                        <option value="Completado" ${activity.status === 'Completado' ? 'selected' : ''}>✅ Completado</option>
                    </select>
                </td>
                <td style="text-align: center;">
                    <div class="actions" style="justify-content: center;">
                        <button class="btn-icon btn-icon-delete" onclick="deleteActivity(${activity.id})" title="Eliminar"><i class="ri-delete-bin-line"></i></button>
                    </div>
                </td>
            `;
            tableBody.appendChild(tr);
        });
        
        // Guardar persistencia en LocalStorage
        localStorage.setItem('my_activities', JSON.stringify(activities));
    }

    // Agregar actividad
    activityForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newActivity = {
            id: Date.now(), // ID único basado en timestamp
            name: document.getElementById('task-name').value,
            desc: document.getElementById('task-desc').value,
            priority: document.getElementById('task-priority').value,
            status: document.getElementById('task-status').value
        };

        activities.push(newActivity);
        renderTable();
        activityForm.reset();
    });

    // Actualizar texto (Edición Inline)
    function updateText(id, field, value) {
        const index = activities.findIndex(a => a.id === id);
        if (index !== -1) {
            activities[index][field] = value.trim();
            localStorage.setItem('my_activities', JSON.stringify(activities));
        }
    }

    // Actualizar Selects (Prioridad y Estado)
    function updateSelect(id, field, value) {
        const index = activities.findIndex(a => a.id === id);
        if (index !== -1) {
            activities[index][field] = value;
            renderTable(); // Re-renderizar para actualizar colores de badges
        }
    }

    // Eliminar actividad
    window.deleteActivity = function(id) {
        if(confirm('¿Seguro que deseas eliminar esta actividad?')) {
            activities = activities.filter(a => a.id !== id);
            renderTable();
        }
    }

    // Inicializar
    renderTable();
</script>

</body>
</html>
