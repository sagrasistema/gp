<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #0284c7; /* Tono azul cielo para diferenciarlo de tareas */
            --accent-hover: #0369a1;
            --border-color: #e2e8f0;
            --status-activo: #10b981;
            --status-inactivo: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; }
        header { margin-bottom: 2rem; }
        h1 { font-size: 1.75rem; font-weight: 700; }
        h1 i { color: var(--accent); margin-right: 0.5rem; }
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 1.5rem; margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .form-group input, .form-group select { padding: 0.65rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        button.btn-primary { background-color: var(--accent); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; height: 42px; justify-content: center; }
        button.btn-primary:hover { background-color: var(--accent-hover); }
        .table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { background-color: #f8fafc; padding: 1rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-color); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }
        .editable { padding: 4px 8px; border-radius: 4px; min-height: 24px; }
        .editable:focus { background-color: #f1f5f9; outline: 2px solid var(--accent); }
        .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.6rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
        .badge-activo { background-color: #d1fae5; color: var(--status-activo); }
        .badge-inactivo { background-color: #fee2e2; color: var(--status-inactivo); }
        select.table-select { border: none; background: transparent; font-weight: 600; cursor: pointer; outline: none; padding: 4px; border-radius: 4px; }
        select.table-select:focus { background-color: #e2e8f0; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 1.1rem; }
        .btn-icon-delete:hover { color: var(--status-inactivo); background-color: #fee2e2; }
        .hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; align-items: center; gap: 0.25rem; }
    </style>
</head>
<body>

<div class="container">
    
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1><i class="ri-team-line"></i> Control de Clientes Alberto</h1>
        <button id="btn-export" class="btn-primary" style="background-color: #10b981; height: 38px;">
            <i class="ri-file-excel-line"></i> Exportar a Excel (CSV)
        </button>
    </header>

    <div class="card">
        <form id="client-form" class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label for="client-name">Cliente / Empresa</label>
                <input type="text" id="client-name" placeholder="Ej. Sagracom C.A." required>
            </div>
            <div class="form-group">
                <label for="client-email">Correo Electrónico</label>
                <input type="email" id="client-email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="client-phone">Teléfono</label>
                <input type="text" id="client-phone" placeholder="Ej. +58 412-1234567">
            </div>
            <div class="form-group">
                <label for="client-status">Estado</label>
                <select id="client-status">
                    <option value="Activo" selected>Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>
            </div>
            <button type="submit" class="btn-primary"><i class="ri-user-add-line"></i> Agregar</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">Cliente</th>
                    <th style="width: 25%;">Correo Electrónico</th>
                    <th style="width: 20%;">Teléfono</th>
                    <th style="width: 12%;">Estado</th>
                    <th style="width: 8%; text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <p class="hint"><i class="ri-information-line"></i> <strong>Tip:</strong> Puedes hacer clic sobre el Nombre, Correo o Teléfono para editarlo directamente. Al hacer clic fuera se guardará en la base de datos.</p>
</div>

<script>
let clients = [];
const tableBody = document.getElementById('table-body');
const clientForm = document.getElementById('client-form');
const btnExport = document.getElementById('btn-export');

btnExport.addEventListener('click', exportToCSV);

// Obtener datos desde api_clientes.php
async function loadClients() {
    try {
        const response = await fetch('api_clientes.php');
        if (!response.ok) throw new Error(`Error en el servidor: ${response.status}`);
        clients = await response.json();
        renderTable();
    } catch (error) {
        console.error("Error cargando clientes:", error);
        alert("No se pudieron cargar los clientes.");
    }
}

// Renderizar la tabla de clientes
function renderTable() {
    tableBody.innerHTML = '';
    
    if (clients.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #64748b; padding: 2rem;">No hay clientes registrados.</td></tr>`;
        return;
    }

    clients.forEach((client) => {
        const tr = document.createElement('tr');
        const statusClass = `badge-${client.status.toLowerCase()}`;

        tr.innerHTML = `
            <td><div class="editable" contenteditable="true" onblur="saveInlineChange(${client.id}, 'name', this.innerText)">${client.name}</div></td>
            <td><div class="editable" contenteditable="true" onblur="saveInlineChange(${client.id}, 'email', this.innerText)">${client.email}</div></td>
            <td><div class="editable" contenteditable="true" onblur="saveInlineChange(${client.id}, 'phone', this.innerText)">${client.phone}</div></td>
            <td>
                <select class="table-select badge ${statusClass}" onchange="saveSelectChange(${client.id}, 'status', this.value)">
                    <option value="Activo" ${client.status === 'Activo' ? 'selected' : ''}>Activo</option>
                    <option value="Inactivo" ${client.status === 'Inactivo' ? 'selected' : ''}>Inactivo</option>
                </select>
            </td>
            <td style="text-align: center;">
                <button class="btn-icon btn-icon-delete" onclick="deleteClient(${client.id})"><i class="ri-delete-bin-line"></i></button>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

// Crear nuevo cliente
clientForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
        name: document.getElementById('client-name').value,
        email: document.getElementById('client-email').value,
        phone: document.getElementById('client-phone').value,
        status: document.getElementById('client-status').value
    };

    try {
        const response = await fetch('api_clientes.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if(response.ok) {
            clientForm.reset();
            loadClients();
        } else {
            alert("Error al guardar en la base de datos.");
        }
    } catch (error) {
        console.error("Error guardando:", error);
    }
});

async function saveInlineChange(id, field, value) {
    const client = clients.find(c => c.id === id);
    if (client) {
        const updated = { ...client, [field]: value.trim() };
        await sendUpdate(updated);
    }
}

async function saveSelectChange(id, field, value) {
    const client = clients.find(c => c.id === id);
    if (client) {
        const updated = { ...client, [field]: value };
        await sendUpdate(updated);
        loadClients();
    }
}

async function sendUpdate(client) {
    try {
        await fetch('api_clientes.php', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: client.id,
                name: client.name,
                email: client.email,
                phone: client.phone,
                status: client.status
            })
        });
    } catch (error) {
        console.error("Error actualizando:", error);
    }
}

async function deleteClient(id) {
    if (confirm('¿Deseas eliminar permanentemente este cliente?')) {
        try {
            const response = await fetch('api_clientes.php', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            if (response.ok) loadClients();
        } catch (error) {
            console.error("Error eliminando:", error);
        }
    }
}

document.addEventListener('DOMContentLoaded', loadClients);

function exportToCSV() {
    if (clients.length === 0) {
        alert("No hay datos disponibles para exportar.");
        return;
    }

    let csvContent = "ID,Cliente,Email,Telefono,Estado\n";

    clients.forEach(client => {
        let id = client.id;
        let name = `"${client.name.replace(/"/g, '""')}"`;
        let email = `"${(client.email || '').replace(/"/g, '""')}"`;
        let phone = `"${(client.phone || '').replace(/"/g, '""')}"`;
        let status = `"${client.status}"`;

        csvContent += `${id},${name},${email},${phone},${status}\n`;
    });

    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `reporte_clientes_${new Date().toISOString().slice(0,10)}.csv`);
    link.style.visibility = 'hidden';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
